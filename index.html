        // ─── Payouts (Expenses) ───
        function Payouts() {
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [desc, setDesc] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().slice(0, 10));

            const load = () => {
                setLoading(true);
                fetch('/api/expenses').then(r => r.json()).then(d => { setExpenses(d); setLoading(false); }).catch(() => setLoading(false));
            };
            useEffect(() => { load(); }, []);

            const addPayout = async () => {
                if (!desc.trim() || !amount) { toast('Fill in description and amount', 'error'); return; }
                try {
                    const res = await fetch('/api/expenses', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ description: desc.trim(), amount: parseFloat(amount), expense_date: date }),
                    });
                    if (res.ok) { toast('Payout recorded!'); setDesc(''); setAmount(''); setShowForm(false); load(); }
                } catch (e) { toast('Failed to add payout', 'error'); }
            };

            const removePayout = async (id) => {
                try { await fetch('/api/expenses/' + id, { method: 'DELETE' }); toast('Payout deleted'); load(); }
                catch (e) { toast('Failed to delete', 'error'); }
            };

            const total = expenses.reduce((s, e) => s + e.amount, 0);
            const fmt = (v) => '$' + (v || 0).toFixed(2);

            if (loading) return <div className="loading"><div className="loading-spinner"></div><div>Loading payouts...</div></div>;

            return (
                <div>
                    <div className="tab-toolbar" style={{ justifyContent: 'space-between' }}>
                        <button onClick={() => setShowForm(!showForm)} style={{ background: showForm ? 'var(--bg-tertiary)' : 'linear-gradient(135deg, var(--accent), #6366f1)' }}>
                            {showForm ? '✕ Cancel' : '+ Add Payout'}
                        </button>
                        <RefreshButton onRefresh={load} />
                    </div>

                    {showForm && (
                        <div className="card" style={{ marginBottom: '16px', border: '1px solid rgba(129,140,248,0.3)', boxShadow: '0 0 25px var(--accent-glow)' }}>
                            <h3 className="section-title" style={{ marginTop: '0' }}>New Payout</h3>
                            <div className="form-group">
                                <label>Description</label>
                                <input type="text" placeholder="e.g. Rent, Electricity, Salary..." value={desc} onChange={e => setDesc(e.target.value)} autoFocus />
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                <div className="form-group">
                                    <label>Amount ($)</label>
                                    <input type="number" step="0.01" placeholder="0.00" value={amount} onChange={e => setAmount(e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label>Date</label>
                                    <input type="date" value={date} onChange={e => setDate(e.target.value)} />
                                </div>
                            </div>
                            <div className="action-buttons">
                                <button className="success" onClick={addPayout}>Record Payout</button>
                            </div>
                        </div>
                    )}

                    <div className="card" style={{ marginBottom: '16px', textAlign: 'center', padding: '20px', background: 'linear-gradient(135deg, rgba(248,113,113,0.1), rgba(248,113,113,0.02))', border: '1px solid rgba(248,113,113,0.2)' }}>
                        <div style={{ fontSize: '11px', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '4px' }}>Total Payouts</div>
                        <div style={{ fontSize: '28px', fontWeight: '700', color: 'var(--danger)' }}>{fmt(total)}</div>
                        <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '4px' }}>{expenses.length} payout{expenses.length !== 1 ? 's' : ''}</div>
                    </div>

                    {expenses.length === 0 ? (
                        <div className="card" style={{ textAlign: 'center', padding: '40px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '12px' }}>💸</div>
                            <h3 style={{ color: 'var(--text-secondary)', margin: '0 0 8px' }}>No Payouts Yet</h3>
                            <p style={{ color: 'var(--text-secondary)', fontSize: '14px', margin: 0 }}>Record rent, utilities, salaries, and other expenses here.</p>
                        </div>
                    ) : (
                        <div className="card">
                            <h3 className="section-title">Payout History</h3>
                            {expenses.map(e => (
                                <div key={e.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontWeight: '500', fontSize: '14px' }}>{e.description}</div>
                                        <div style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>{e.expense_date || (e.created_at || '').slice(0, 10)}</div>
                                    </div>
                                    <div style={{ fontWeight: '600', color: 'var(--danger)', fontSize: '15px', marginRight: '12px' }}>-{fmt(e.amount)}</div>
                                    <button onClick={() => removePayout(e.id)} style={{ background: 'rgba(248,113,113,0.1)', color: 'var(--danger)', border: 'none', borderRadius: '8px', padding: '6px 10px', cursor: 'pointer', fontSize: '12px', minHeight: 'auto' }}>✕</button>

        function AIInsights({ onNavigate }) {
            const [enabled, setEnabled] = useState(null);   // null = still checking
            const [digest, setDigest] = useState('');
            const [reorder, setReorder] = useState('');
            const [loadingDigest, setLoadingDigest] = useState(false);
            const [loadingReorder, setLoadingReorder] = useState(false);

            useEffect(() => {
                fetch('/api/ai/status')
                    .then(r => r.json())
                    .then(d => setEnabled(d.enabled))
                    .catch(() => setEnabled(false));
            }, []);

            const runDigest = async () => {
                setLoadingDigest(true); setDigest('');
                try {
                    const r = await fetch('/api/ai/digest');
                    const d = await r.json();
                    setDigest(d.digest || d.message || 'Could not generate a digest.');
                } catch (e) {
                    setDigest('Something went wrong reaching the AI service.');
                } finally { setLoadingDigest(false); }
            };

            const runReorder = async () => {
                setLoadingReorder(true); setReorder('');
                try {
                    const r = await fetch('/api/ai/reorder');
                    const d = await r.json();
                    setReorder(d.suggestions || d.message || 'Could not generate suggestions.');
                } catch (e) {
                    setReorder('Something went wrong reaching the AI service.');
                } finally { setLoadingReorder(false); }
            };

            if (enabled === null) {
                return <div className="loading"><div className="loading-spinner"></div><div>Checking AI status...</div></div>;
            }

            if (!enabled) {
                return (
                    <div className="card" style={{ textAlign: 'center', padding: '40px 24px' }}>
                        <div style={{ fontSize: '48px', marginBottom: '12px' }}>✨</div>
                        <h3 className="section-title" style={{ justifyContent: 'center' }}>AI features are off</h3>
                        <p style={{ color: 'var(--text-secondary)', maxWidth: '420px', margin: '0 auto 20px' }}>
                            Add your own Anthropic API key to unlock a weekly business digest,
                            smart reorder alerts, and auto-written WhatsApp confirmations.
                            Everything else in VendorVault works without it.
                        </p>
                        <button className="success" onClick={() => onNavigate && onNavigate('settings')}>
                            Add API Key in Settings
                        </button>
                    </div>
                );
            }

            return (
                <div>
                    <div className="card">
                        <h3 className="section-title">📊 Weekly Business Digest</h3>
                        <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '16px' }}>
                            A plain-English summary of this week's numbers with one thing to watch.
                        </p>
                        {digest && (
                            <div style={{ whiteSpace: 'pre-wrap', background: 'var(--bg-tertiary)',
                                padding: '16px', borderRadius: '10px', marginBottom: '16px', lineHeight: '1.6' }}>
                                {digest}
                            </div>
                        )}
                        <button className="success" onClick={runDigest} disabled={loadingDigest}>
                            {loadingDigest ? 'Thinking...' : (digest ? 'Regenerate' : 'Generate Digest')}
                        </button>
                    </div>

                    <div className="card">
                        <h3 className="section-title">📦 Smart Reorder Alerts</h3>
                        <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '16px' }}>
                            Looks at your current stock and flags what's running low.
                        </p>
                        {reorder && (
                            <div style={{ whiteSpace: 'pre-wrap', background: 'var(--bg-tertiary)',
                                padding: '16px', borderRadius: '10px', marginBottom: '16px', lineHeight: '1.6' }}>
                                {reorder}
                            </div>
                        )}
                        <button className="success" onClick={runReorder} disabled={loadingReorder}>
                            {loadingReorder ? 'Checking...' : (reorder ? 'Refresh' : 'Check Stock')}
                        </button>
                    </div>
                </div>
            );
        }

        function Settings() {
            const [form, setForm] = useState({
                business_name: '',
                email: '',
                phone: '',
                address: '',
                currency: 'USD',
            });
            const [loading, setLoading] = useState(true);
            const [saved, setSaved] = useState(false);
            const [aiKeySet, setAiKeySet] = useState(false);
            const [aiKeyPreview, setAiKeyPreview] = useState('');
            const [aiKeyInput, setAiKeyInput] = useState('');
            const [aiKeyEditing, setAiKeyEditing] = useState(false);
            const [aiKeyLoading, setAiKeyLoading] = useState(false);
            const [showAiKey, setShowAiKey] = useState(false);

            const loadSettings = () => fetch('/api/settings')
                .then(r => r.json())
                .then(data => {
                    setForm(prev => ({ ...prev, ...data }));
                    setAiKeySet(data.ai_key_set || false);
                    setAiKeyPreview(data.ai_key_preview || '');
                    setLoading(false);
                })
                .catch(() => setLoading(false));

            useEffect(() => { loadSettings(); }, []);

            const saveSettings = async () => {
                try {
                    const res = await fetch('/api/settings', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form),
                    });
                    if (res.ok) {
                        setSaved(true);
                        setTimeout(() => setSaved(false), 2000);
                        toast('Settings saved!');
                    }
                } catch (e) {
                    toast('Failed to save settings', 'error');
                }
            };

            const saveAiKey = async () => {
                if (!aiKeyInput.trim()) return;
                setAiKeyLoading(true);
                try {
                    const res = await fetch('/api/settings/ai-key', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: aiKeyInput.trim() }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setAiKeySet(true);
                        setAiKeyPreview(data.preview);
                        setAiKeyInput('');
                        setAiKeyEditing(false);
                        setShowAiKey(false);
                        toast('AI API key saved!');
                    } else {
                        toast(data.error || 'Failed to save key', 'error');
                    }
                } catch (e) {
                    toast('Failed to save key', 'error');
                } finally {
                    setAiKeyLoading(false);
                }
            };

            const deleteAiKey = async () => {
                if (!confirm('Remove the AI API key? AI features will be disabled until you add a new one.')) return;
                setAiKeyLoading(true);
                try {
                    const res = await fetch('/api/settings/ai-key', { method: 'DELETE' });
                    if (res.ok) {
                        setAiKeySet(false);
                        setAiKeyPreview('');
                        setAiKeyInput('');
                        setAiKeyEditing(false);
                        toast('AI API key removed.');
                    }
                } catch (e) {
                    toast('Failed to remove key', 'error');
                } finally {
                    setAiKeyLoading(false);
                }
            };

            if (loading) {
                return <div className="loading"><div className="loading-spinner"></div><div>Loading settings...</div></div>;
            }

            return (
                <div>
                    <div className="tab-toolbar" style={{ justifyContent: 'flex-end' }}>
                        <RefreshButton onRefresh={loadSettings} />
                    </div>
                    <div className="card">
                        <h3 className="section-title">App Settings</h3>
                        <div className="form-group">
                            <label>Business Name</label>
                            <input type="text" placeholder="Your business name"
                                value={form.business_name}
                                onChange={e => setForm({...form, business_name: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="contact@business.com"
                                value={form.email}
                                onChange={e => setForm({...form, email: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label>Phone</label>
                            <input type="tel" placeholder="+1234567890"
                                value={form.phone}
                                onChange={e => setForm({...form, phone: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label>Address</label>
                            <input type="text" placeholder="123 Main St, City"
                                value={form.address}
                                onChange={e => setForm({...form, address: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label>Currency</label>
                            <select value={form.currency} onChange={e => setForm({...form, currency: e.target.value})}>
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="INR">INR (₹)</option>
                                <option value="PHP">PHP (₱)</option>
                            </select>
                        </div>
                        <div className="action-buttons">
                            <button className="success" onClick={saveSettings}>
                                {saved ? '✓ Saved' : 'Save Settings'}
                            </button>
                        </div>
                    </div>

                    <div className="card">
                        <h3 className="section-title">AI API Key</h3>
                        <p style={{ color: 'var(--text-secondary)', marginBottom: '16px', fontSize: '14px' }}>
                            Add your own API key to enable AI-powered features — menu recommendations, cost insights, reorder suggestions.
                            Everything else works without it.
                        </p>

                        {aiKeySet && !aiKeyEditing ? (
                            <div>
                                <div className="form-group">
                                    <label>Current Key</label>
                                    <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                        <input
                                            type={showAiKey ? 'text' : 'password'}
                                            value={aiKeyPreview}
                                            readOnly
                                            style={{ flex: 1, background: 'var(--bg-tertiary)', cursor: 'default' }}
                                        />
                                        <button
                                            style={{ padding: '10px 14px', background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: '8px', color: 'var(--text-secondary)', cursor: 'pointer', whiteSpace: 'nowrap' }}
                                            onClick={() => setShowAiKey(v => !v)}
                                        >
                                            {showAiKey ? 'Hide' : 'Show'}
                                        </button>
                                    </div>
                                </div>
                                <div className="action-buttons">
                                    <button onClick={() => { setAiKeyEditing(true); setAiKeyInput(''); }}
                                        style={{ background: 'var(--accent)' }}>
                                        Edit Key
                                    </button>
                                    <button className="danger" onClick={deleteAiKey} disabled={aiKeyLoading}>
                                        {aiKeyLoading ? 'Removing...' : 'Remove Key'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div className="form-group">
                                    <label>{aiKeySet ? 'New API Key' : 'API Key'}</label>
                                    <input
                                        type="password"
                                        placeholder="sk-..."
                                        value={aiKeyInput}
                                        onChange={e => setAiKeyInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && saveAiKey()}
                                        autoComplete="off"
                                    />
                                    <small style={{ color: 'var(--text-secondary)', fontSize: '12px', marginTop: '6px', display: 'block' }}>
                                        Your key is stored locally and never sent anywhere except the AI provider.
                                    </small>
                                </div>
                                <div className="action-buttons">
                                    <button className="success" onClick={saveAiKey} disabled={aiKeyLoading || !aiKeyInput.trim()}>
                                        {aiKeyLoading ? 'Saving...' : 'Save Key'}
                                    </button>
                                    {aiKeyEditing && (
                                        <button onClick={() => { setAiKeyEditing(false); setAiKeyInput(''); }}
                                            style={{ background: 'var(--bg-tertiary)' }}>
                                            Cancel
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <h3 className="section-title">Network Access</h3>
                        <NetworkInfo />
                    </div>

                    <div className="card">
                        <h3 className="section-title">Account</h3>
                        <p style={{ color: 'var(--text-secondary)', marginBottom: '16px', fontSize: '14px' }}>
                            You're signed in as the kitchen owner.
                        </p>
                        <div className="action-buttons">
                            <button className="danger" onClick={async () => {
                                await fetch('/api/logout', { method: 'POST' });
                                window.location.href = '/login';
                            }}>
                                Log Out
                            </button>
                        </div>
                    </div>

                    <div className="card">
                        <h3 className="section-title">About</h3>
                        <p style={{ color: 'var(--text-secondary)' }}>
                            VendorVault v1.0 — © 2026 Gaurav Singh Thakur. MIT License.
                        </p>
                    </div>
                </div>
            );
        }

        function NetworkInfo() {
            const [info, setInfo] = useState(null);

            useEffect(() => {
                fetch('/api/network-info')
                    .then(r => r.json())
                    .then(setInfo)
                    .catch(() => {});
            }, []);

            if (!info || info.error) return <p style={{color:'var(--text-secondary)'}}>Could not detect network info.</p>;

            return (
                <div>
                    <div style={{marginBottom:'8px',display:'flex',justifyContent:'space-between'}}>
                        <span style={{color:'var(--text-secondary)'}}>Local URL</span>
                        <span>{info.localUrl}</span>
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between'}}>
                        <span style={{color:'var(--text-secondary)'}}>Phone / Network</span>
                        <span>{info.networkUrl}</span>
                    </div>
                    <p style={{color:'var(--text-secondary)', fontSize:'12px', marginTop:'12px'}}>
                        Open the network URL on your phone (same WiFi) to use VendorVault as a mobile app.
                    </p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ToastProvider><App /></ToastProvider>);
    </script>
</body>
</html>
{% endraw %}
